[project]
site_name = "DECADE-X Standards"
site_url = "https://shibukawa310.github.io/dx_standards/"

nav = [
    { "Home" = "index.md" },
    { "Active Standards" = [
        { "DX-0001 Pattern" = "active/AX-001.md" },
        { "DX-0002 Standard" = "active/AX-002.md" },
        { "DX-0003 Standard" = "active/AX-003.md" }
    ]},
    { "Retired Standards" = [
        { "Archives" = "retired/index.md" }
    ]}
]

[project.theme]
name = "material"
features = [
    "search.suggest",
    "search.highlight"
]

[project.markdown_extensions]
attr_list = {}
md_in_html = {}
abbr = {}
admonition = {}

[project.markdown_extensions.pymdownx.snippets]
base_path = "includes"
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.plugins.tags]
tags_file = "tags.md"
