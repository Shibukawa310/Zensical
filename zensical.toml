[project]
site_name = "DECADE-X Standards"
site_url = "https://shibukawa310.github.io/dx_standards/"

[project.theme]
name = "material"
# On retire navigation.tabs pour avoir tout sur le côté
features = [
    "navigation.sections",
    "navigation.expand",
    "search.suggest",
    "search.highlight"
]
palette = { scheme = "default", primary = "indigo", accent = "blue" }

[project.markdown_extensions]
attr_list = {}
md_in_html = {}
abbr = {}
admonition = {}

[project.markdown_extensions.pymdownx.snippets]
base_path = "includes"

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.plugins.tags]
tags_file = "tags.md"
